    <style>
        body {

            margin: 60px auto;
            padding: 0 20px;
            background: #f8fafc;

        h1 { color: #0f172a; }
        .demo-card {

        .badge {
            background: #eef2ff;
            color: #1e40af;

            font-weight: 500;

<body>
    <h1>📐 Specialist Mathematics Demonstrations</h1>
    <p>Interactive 3D geometry and vector applets for classroom use.</p>

    <div class="demo-card">
        <a href="shortest distance from a point to a line">
