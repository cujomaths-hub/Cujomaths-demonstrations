<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Sketching Parabolas (Turning-Point Form) | Specialist Mathematics</title>
  <script>
    (function () {
      try {
        var k = "cujomaths-theme";
        var v = localStorage.getItem(k);
        if (v !== "light" && v !== "dark" && v !== "system") v = "system";
        var d = "light";
        if (v === "dark") d = "dark";
        else if (v === "light") d = "light";
        else d = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = d;
        document.documentElement.dataset.themeSetting = v;
      } catch (e) {}
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .parabolaGrid { display: grid; grid-template-columns: minmax(260px, 1fr) minmax(280px, 1.2fr); gap: 16px; align-items: start; }
    @media (max-width: 900px) { .parabolaGrid { grid-template-columns: 1fr; } }
    .parabolaSvg { width: 100%; max-width: 480px; height: auto; background: var(--cm-card-bg); border-radius: 8px; border: 1px solid var(--cm-border); }
    .inputsCard input:read-only { background: var(--cm-representation-bg); cursor: default; }
    .shapeRow { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .shapeRow button { min-width: 100px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import { fmt } from "../shared/math/format.js";
    import { InstructionsDetails, TeacherModeToggle, ThemeSelect } from "../shared/ui/applet-ui.js";
    import {
      readParabolaVertexState,
      buildParabolaVertexQuery,
      replaceHistoryQuery,
    } from "../shared/ui/url-state.js";
    import { StepInput, ScaffoldedStepList } from "../shared/ui/scaffold-steps.js";
    import { Latex } from "../shared/ui/latex.js";

    const VERTEX_EXAMPLES = [
      { a: 2, h: 1, k: -3 },
      { a: -0.5, h: -2, k: 4 },
      { a: 1, h: 0, k: 0 },
      { a: -1, h: 2, k: 3 },
      { a: 1, h: -1, k: -2 },
      { a: 0.5, h: 2, k: 1 },
    ];

    function evalVertex(a, h, k, x) {
      return a * (x - h) * (x - h) + k;
    }

    function rootsVertex(a, h, k) {
      if (Math.abs(a) < 1e-12) return { kind: "none", roots: [] };
      const rhs = -k / a;
      if (rhs < -1e-9) return { kind: "none", roots: [] };
      if (Math.abs(rhs) < 1e-9) return { kind: "one", roots: [h] };
      const s = Math.sqrt(rhs);
      const r1 = h - s;
      const r2 = h + s;
      return { kind: "two", roots: [Math.min(r1, r2), Math.max(r1, r2)] };
    }

    function yInterceptVertex(a, h, k) {
      return evalVertex(a, h, k, 0);
    }

    function numClose(u, v, rel = 1e-4) {
      if (!Number.isFinite(u) || !Number.isFinite(v)) return false;
      return Math.abs(u - v) <= rel * (1 + Math.abs(v)) || Math.abs(u - v) < 1e-8;
    }

    function texNum(n) {
      if (!Number.isFinite(n)) return "?";
      const s = fmt(n, 4);
      if (/^-?\d+$/.test(s)) return s;
      return `\\text{${s}}`;
    }

    function vertexEqLatex(a, h, k) {
      if (Math.abs(a) < 1e-9) return "y \\text{ (not a quadratic)}";
      const inner =
        Math.abs(h) < 1e-9
          ? "x"
          : h > 0
          ? `(x-${texNum(h)})`
          : `(x+${texNum(Math.abs(h))})`;
      let t = Math.abs(a - 1) < 1e-9 ? `y = ${inner}^{2}` : Math.abs(a + 1) < 1e-9 ? `y = -${inner}^{2}` : `y = ${texNum(a)}${inner}^{2}`;
      if (Math.abs(k) > 1e-9) {
        t += k > 0 ? ` + ${texNum(k)}` : ` - ${texNum(Math.abs(k))}`;
      }
      return t;
    }

    function parseRootsAnswer(str, expected) {
      const s = String(str).trim().toLowerCase();
      if (expected.length === 0) {
        return s === "" || s === "none" || s === "no" || s === "n/a" || s === "na";
      }
      if (expected.length === 1) {
        const n = Number(s);
        return Number.isFinite(n) && numClose(n, expected[0]);
      }
      const parts = s.split(/[,;\s]+/).filter(Boolean).map(Number);
      if (parts.length !== 2 || !parts.every(Number.isFinite)) return false;
      const sorted = [...parts].sort((p, q) => p - q);
      return numClose(sorted[0], expected[0]) && numClose(sorted[1], expected[1]);
    }

    function plotBoundsVertex(a, h, k, roots, y0) {
      const xs = [0, h, ...roots].filter((x) => Number.isFinite(x));
      const ys = [y0, k, 0].filter((y) => Number.isFinite(y));
      let minX = Math.min(-5, ...xs.map((x) => x - 1));
      let maxX = Math.max(5, ...xs.map((x) => x + 1));
      let minY = Math.min(-5, ...ys.map((y) => y - 1));
      let maxY = Math.max(5, ...ys.map((y) => y + 1));
      if (Math.abs(maxX - minX) < 2) {
        minX -= 1;
        maxX += 1;
      }
      if (Math.abs(maxY - minY) < 2) {
        minY -= 1;
        maxY += 1;
      }
      return { minX, maxX, minY, maxY };
    }

    function ParabolaPlotVertex({ a, h, k }) {
      const W = 420;
      const H = 340;
      const pad = 28;
      const invalid = Math.abs(a) < 1e-12;
      const r = invalid ? { kind: "none", roots: [] } : rootsVertex(a, h, k);
      const roots = r.roots || [];
      const y0 = invalid ? NaN : yInterceptVertex(a, h, k);
      const bounds = invalid
        ? { minX: -5, maxX: 5, minY: -5, maxY: 5 }
        : plotBoundsVertex(a, h, k, roots, y0);
      const { minX, maxX, minY, maxY } = bounds;
      const sx = (x) => pad + ((x - minX) / (maxX - minX || 1)) * (W - 2 * pad);
      const sy = (y) => H - pad - ((y - minY) / (maxY - minY || 1)) * (H - 2 * pad);

      const pathPts = [];
      if (!invalid) {
        const steps = 120;
        for (let i = 0; i <= steps; i++) {
          const x = minX + (i / steps) * (maxX - minX);
          const y = evalVertex(a, h, k, x);
          if (!Number.isFinite(y) || Math.abs(y) > 1e4) continue;
          pathPts.push({ x: sx(x), y: sy(y) });
        }
      }
      const dPath = pathPts.length
        ? pathPts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ")
        : "";

      const mark = (x, y, fill, label) => {
        if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
        const px = sx(x);
        const py = sy(y);
        if (px < pad - 5 || px > W - pad + 5 || py < pad - 5 || py > H - pad + 5) return null;
        return React.createElement(
          React.Fragment,
          { key: label },
          React.createElement("circle", { cx: px, cy: py, r: 5, fill }),
          React.createElement("text", { x: px + 8, y: py - 6, fontSize: 11, fill: "var(--cm-muted)" }, label)
        );
      };

      return React.createElement(
        "div",
        { className: "diagramCard" },
        React.createElement("h3", { className: "cardTitle" }, "Graph sketch"),
        invalid
          ? React.createElement("p", { className: "error" }, "Set a ≠ 0 to show a parabola.")
          : React.createElement(
              "svg",
              { viewBox: `0 0 ${W} ${H}`, className: "parabolaSvg", role: "img", "aria-label": "Parabola plot" },
              React.createElement("rect", { x: 0, y: 0, width: W, height: H, fill: "transparent" }),
              React.createElement("line", {
                x1: sx(minX),
                y1: sy(0),
                x2: sx(maxX),
                y2: sy(0),
                stroke: "var(--cm-border)",
                strokeWidth: 1,
              }),
              React.createElement("line", {
                x1: sx(0),
                y1: sy(minY),
                x2: sx(0),
                y2: sy(maxY),
                stroke: "var(--cm-border)",
                strokeWidth: 1,
              }),
              dPath &&
                React.createElement("path", {
                  d: dPath,
                  fill: "none",
                  stroke: "var(--cm-accent, #2563eb)",
                  strokeWidth: 2.5,
                }),
              Number.isFinite(h) &&
                React.createElement("line", {
                  x1: sx(h),
                  y1: sy(minY),
                  x2: sx(h),
                  y2: sy(maxY),
                  stroke: "var(--cm-muted)",
                  strokeDasharray: "6 4",
                  strokeWidth: 1,
                }),
              mark(0, y0, "#f97316", "(0, y)"),
              r.kind === "one" && mark(roots[0], 0, "#059669", "x-int"),
              r.kind === "two" &&
                React.createElement(React.Fragment, null,
                  mark(roots[0], 0, "#059669", "x₁"),
                  mark(roots[1], 0, "#059669", "x₂")),
              mark(h, k, "#7c3aed", "(h, k)")
            )
      );
    }

    const TabButton = ({ active, onClick, children }) =>
      React.createElement("button", { type: "button", className: active ? "tab active" : "tab", onClick }, children);

    const ShapePick = ({ value, onChange }) =>
      React.createElement(
        "div",
        { className: "controlGroup" },
        React.createElement("label", null, "Shape (practice)"),
        React.createElement(
          "div",
          { className: "shapeRow" },
          React.createElement(
            "button",
            { type: "button", className: value === "happy" ? "pill activePill" : "pill", onClick: () => onChange("happy") },
            "Happy (a > 0)"
          ),
          React.createElement(
            "button",
            { type: "button", className: value === "sad" ? "pill activePill" : "pill", onClick: () => onChange("sad") },
            "Sad (a < 0)"
          )
        )
      );

    const App = () => {
      const initialUrl = React.useMemo(
        () => readParabolaVertexState(window.location.search, VERTEX_EXAMPLES),
        []
      );
      const [dataMode, setDataMode] = React.useState(initialUrl.dataMode);
      const [exampleIndex, setExampleIndex] = React.useState(initialUrl.exampleIndex);
      const [a, setA] = React.useState(initialUrl.a);
      const [h, setH] = React.useState(initialUrl.h);
      const [k, setK] = React.useState(initialUrl.k);
      const [teacherMode, setTeacherMode] = React.useState(initialUrl.teacherMode);
      const [bottomTab, setBottomTab] = React.useState(initialUrl.bottomTab);
      const [showWorking, setShowWorking] = React.useState(initialUrl.showWorking);
      const [practiceMode, setPracticeMode] = React.useState(initialUrl.practiceMode);
      const [answers, setAnswers] = React.useState({
        shape: "",
        tpH: "",
        tpK: "",
        yint: "",
        roots: "",
        vertexPair: "",
      });
      const [checked, setChecked] = React.useState(false);
      const [copyHint, setCopyHint] = React.useState("");
      const skipFirstUrlSync = React.useRef(true);

      const supported = dataMode === "supported";
      const invalidA = Math.abs(a) < 1e-12;
      const r = invalidA ? { kind: "none", roots: [] } : rootsVertex(a, h, k);
      const y0 = invalidA ? NaN : yInterceptVertex(a, h, k);
      const rhsSq = invalidA ? NaN : -k / a;

      const urlPayload = () => ({
        teacherMode,
        bottomTab,
        showWorking,
        practiceMode,
        dataMode,
        a,
        h,
        k,
      });

      React.useEffect(() => {
        if (skipFirstUrlSync.current) {
          skipFirstUrlSync.current = false;
          return;
        }
        replaceHistoryQuery(buildParabolaVertexQuery(urlPayload(), VERTEX_EXAMPLES));
      }, [teacherMode, bottomTab, showWorking, practiceMode, dataMode, a, h, k]);

      const copyShareLink = async () => {
        const q = buildParabolaVertexQuery(urlPayload(), VERTEX_EXAMPLES);
        const path = q ? `${window.location.pathname}?${q}` : window.location.pathname;
        const url = `${window.location.origin}${path}`;
        try {
          await navigator.clipboard.writeText(url);
          setCopyHint("Link copied");
          window.setTimeout(() => setCopyHint(""), 2000);
        } catch {
          window.prompt("Copy this link:", url);
        }
      };

      const applyEx = (i) => {
        const ex = VERTEX_EXAMPLES[i];
        setA(ex.a);
        setH(ex.h);
        setK(ex.k);
      };

      const newExample = () => {
        let idx;
        do {
          idx = Math.floor(Math.random() * VERTEX_EXAMPLES.length);
        } while (VERTEX_EXAMPLES.length > 1 && idx === exampleIndex);
        setExampleIndex(idx);
        applyEx(idx);
        clearPractice();
      };

      const reset = () => {
        setDataMode("supported");
        setExampleIndex(0);
        applyEx(0);
        setTeacherMode(false);
        setBottomTab("student");
        setShowWorking(true);
        setPracticeMode("scaffolded");
        clearPractice();
      };

      function clearPractice() {
        setAnswers({ shape: "", tpH: "", tpK: "", yint: "", roots: "", vertexPair: "" });
        setChecked(false);
      }

      const updateAnswer = (key, val) => {
        setAnswers((prev) => ({ ...prev, [key]: val }));
        setChecked(false);
      };

      const expectedShape = a > 0 ? "happy" : "sad";

      const checks = React.useMemo(() => {
        const r0 = rootsVertex(a, h, k);
        const yInt = yInterceptVertex(a, h, k);
        const shapeOk = answers.shape === expectedShape;
        const tpHOk = numClose(Number(String(answers.tpH).trim()), h);
        const tpKOk = numClose(Number(String(answers.tpK).trim()), k);
        const yintOk = numClose(Number(String(answers.yint).trim()), yInt);
        const rootsOk = parseRootsAnswer(answers.roots, r0.roots);
        const parts = String(answers.vertexPair)
          .split(",")
          .map((s) => Number(String(s).trim()))
          .filter((n) => Number.isFinite(n));
        const vertexPairOk =
          parts.length === 2 && numClose(parts[0], h) && numClose(parts[1], k);
        return { shapeOk, tpHOk, tpKOk, yintOk, rootsOk, vertexPairOk };
      }, [answers, a, h, k, expectedShape]);

      const practiceChecks =
        practiceMode === "unscaffolded"
          ? { vertexPairOk: checks.vertexPairOk }
          : {
              shapeOk: checks.shapeOk,
              tpHOk: checks.tpHOk,
              tpKOk: checks.tpKOk,
              yintOk: checks.yintOk,
              rootsOk: checks.rootsOk,
            };

      const allCorrect = Object.values(practiceChecks).every(Boolean);

      const rootsPlaceholder = () => {
        if (invalidA) return "—";
        if (r.kind === "none") return "none";
        if (r.kind === "one") return fmt(r.roots[0], 4);
        return `${fmt(r.roots[0], 4)}, ${fmt(r.roots[1], 4)}`;
      };

      return React.createElement(
        "main",
        { className: "page" },
        React.createElement(
          "section",
          { className: "hero" },
          React.createElement(
            "div",
            null,
            React.createElement("span", { className: "badge" }, "Specialist Mathematics"),
            React.createElement("h1", null, "Sketching parabolas — turning-point form"),
            React.createElement(
              "p",
              null,
              "Work from ",
              React.createElement(Latex, { tex: "y = a(x-h)^{2}+k" }),
              " to read the vertex, intercepts, and shape, then match the sketch."
            )
          ),
          React.createElement(
            "div",
            { className: "buttonRow" },
            React.createElement(TeacherModeToggle, {
              value: teacherMode,
              onChange: (v) => {
                setTeacherMode(v);
                if (!v) setBottomTab((t) => (t === "teacher" ? "student" : t));
              },
            }),
            React.createElement(ThemeSelect, { id: "parabola-vtx-theme" }),
            React.createElement("button", { type: "button", className: "outlineButton", onClick: copyShareLink }, "Copy link"),
            React.createElement("button", { type: "button", className: "outlineButton", onClick: reset }, "↺ Reset"),
            copyHint && React.createElement("span", { className: "tiny", style: { alignSelf: "center" } }, copyHint)
          )
        ),
        React.createElement(
          "section",
          { className: "parabolaGrid" },
          React.createElement(
            "aside",
            { className: "card inputsCard" },
            React.createElement("h2", null, "Equation"),
            React.createElement("p", { className: "muted" }, supported
              ? "Supported mode loads preset equations. Use “New supported example” or switch to unsupported to type your own a, h, k."
              : "Edit a, h, and k in y = a(x − h)² + k. Keep a ≠ 0."),
            React.createElement(
              "div",
              { className: "controlGroup" },
              React.createElement("label", null, "Geometry"),
              React.createElement(
                "select",
                {
                  value: dataMode,
                  onChange: (e) => {
                    const m = e.target.value;
                    setDataMode(m);
                    setChecked(false);
                    if (m === "supported") applyEx(exampleIndex);
                    clearPractice();
                  },
                },
                React.createElement("option", { value: "supported" }, "Supported geometry"),
                React.createElement("option", { value: "unsupported" }, "Unsupported geometry")
              )
            ),
            supported &&
              React.createElement("button", { type: "button", className: "primaryButton", onClick: newExample }, "New supported example"),
            React.createElement(
              "div",
              { className: "inputGroup" },
              React.createElement("label", null, "Parameters a, h, k"),
              React.createElement(
                "div",
                { className: "triple" },
                ["a", "h", "k"].map((label, i) => {
                  const vals = [a, h, k];
                  const setters = [setA, setH, setK];
                  return React.createElement("input", {
                    key: label,
                    type: "number",
                    step: "any",
                    title: label,
                    readOnly: supported,
                    value: vals[i],
                    onChange: supported
                      ? undefined
                      : (e) => {
                          setters[i](Number(e.target.value));
                          setChecked(false);
                        },
                  });
                })
              )
            ),
            invalidA && React.createElement("p", { className: "error" }, "Parameter a must be non-zero."),
            React.createElement(
              "div",
              { className: "representationBox" },
              React.createElement("h3", null, "Equation"),
              React.createElement(Latex, { tex: vertexEqLatex(a, h, k), className: "formulaBox" })
            ),
            React.createElement(
              "div",
              { className: "rowBetween workingHeader" },
              React.createElement("h3", null, "Key features"),
              React.createElement(
                "button",
                { type: "button", className: "outlineButton small", onClick: () => setShowWorking(!showWorking) },
                showWorking ? "Hide" : "Show",
                " details"
              )
            ),
            showWorking &&
              React.createElement(
                "div",
                { className: "working" },
                React.createElement("p", null, "Goal: turning point first, then y-intercept, then x-intercepts — see ", React.createElement("code", null, "docs/parabolas/"), " handout."),
                React.createElement(
                  "p",
                  null,
                  "Turning point: ",
                  React.createElement(Latex, { tex: `(h,k) = (${texNum(h)},\\,${texNum(k)})` }),
                  ". Axis of symmetry: ",
                  React.createElement(Latex, { tex: `x = ${texNum(h)}` }),
                  "."
                ),
                !invalidA &&
                  React.createElement(
                    "p",
                    null,
                    "y-intercept: ",
                    React.createElement(Latex, {
                      tex: `y = a(0-h)^{2}+k = ${texNum(y0)} \\Rightarrow (0,\\,${texNum(y0)})`,
                    })
                  ),
                !invalidA &&
                  React.createElement(
                    "p",
                    null,
                    "For x-intercepts set y = 0: ",
                    React.createElement(Latex, { tex: `(x-h)^{2} = ${texNum(rhsSq)}` }),
                    r.kind === "none"
                      ? " → no real x-intercepts."
                      : r.kind === "one"
                      ? " → touches axis once."
                      : " → two symmetric solutions."
                  )
              )
          ),
          React.createElement("div", { className: "card" }, React.createElement(ParabolaPlotVertex, { a, h, k }))
        ),
        React.createElement(
          "section",
          { className: "card lowerCard" },
          React.createElement(
            "div",
            { className: teacherMode ? "tabs three" : "tabs two" },
            React.createElement(TabButton, { active: bottomTab === "student", onClick: () => setBottomTab("student") }, "Student practice"),
            React.createElement(TabButton, { active: bottomTab === "howto", onClick: () => setBottomTab("howto") }, "How to use"),
            teacherMode && React.createElement(TabButton, { active: bottomTab === "teacher", onClick: () => setBottomTab("teacher") }, "Teacher resources")
          ),
          bottomTab === "student" &&
            React.createElement(
              "div",
              { className: "tabContent" },
              React.createElement(
                "div",
                { className: "rowBetween" },
                React.createElement("h2", null, "Student practice"),
                React.createElement(
                  "div",
                  { className: "buttonRow" },
                  React.createElement(
                    "button",
                    {
                      type: "button",
                      className: practiceMode === "scaffolded" ? "pill activePill" : "pill",
                      onClick: () => {
                        setPracticeMode("scaffolded");
                        setChecked(false);
                      },
                    },
                    "Scaffolded"
                  ),
                  React.createElement(
                    "button",
                    {
                      type: "button",
                      className: practiceMode === "unscaffolded" ? "pill activePill" : "pill",
                      onClick: () => {
                        setPracticeMode("unscaffolded");
                        setChecked(false);
                      },
                    },
                    "Unscaffolded"
                  ),
                  React.createElement("button", { type: "button", className: "primaryButton", onClick: () => setChecked(true) }, "Check working"),
                  React.createElement("button", { type: "button", className: "outlineButton", onClick: clearPractice }, "Clear")
                )
              ),
              React.createElement(
                "p",
                { className: "muted" },
                "Scaffolded steps follow the template: shape, vertex coordinates, y-intercept, then x-intercepts (type none if none)."
              ),
              practiceMode === "unscaffolded"
                ? React.createElement(StepInput, {
                    title: "Turning point (h, k)",
                    prompt: "Enter h and k separated by a comma (same order as in y = a(x − h)² + k).",
                    hint: "Match the purple vertex on the graph.",
                    value: answers.vertexPair,
                    onChange: (val) => updateAnswer("vertexPair", val),
                    placeholder: `${fmt(h, 4)},${fmt(k, 4)}`,
                    checked,
                    correct: checks.vertexPairOk,
                    supported: true,
                    incorrectMessage: "Compare with (h, k) in the Key features panel.",
                  })
                : React.createElement(
                    React.Fragment,
                    null,
                    React.createElement(ShapePick, { value: answers.shape, onChange: (val) => updateAnswer("shape", val) }),
                    React.createElement(ScaffoldedStepList, {
                      steps: [
                        {
                          id: "h",
                          render: () =>
                            React.createElement(StepInput, {
                              title: "h (turning x)",
                              prompt: "From y = a(x − h)² + k, what is h?",
                              hint: "Watch the sign: x + 2 means h = −2.",
                              value: answers.tpH,
                              onChange: (val) => updateAnswer("tpH", val),
                              placeholder: fmt(h, 4),
                              checked,
                              correct: checks.tpHOk,
                              supported: true,
                              incorrectMessage: "h is the horizontal shift in (x − h).",
                            }),
                        },
                        {
                          id: "k",
                          render: () =>
                            React.createElement(StepInput, {
                              title: "k (turning y)",
                              prompt: "What is k?",
                              hint: "The vertical shift after the squared term.",
                              value: answers.tpK,
                              onChange: (val) => updateAnswer("tpK", val),
                              placeholder: fmt(k, 4),
                              checked,
                              correct: checks.tpKOk,
                              supported: true,
                              incorrectMessage: "k is the y-coordinate of the vertex.",
                            }),
                        },
                        {
                          id: "yint",
                          render: () =>
                            React.createElement(StepInput, {
                              title: "y-intercept",
                              prompt: "Substitute x = 0 into y = a(x − h)² + k. What is y?",
                              hint: "Single number.",
                              value: answers.yint,
                              onChange: (val) => updateAnswer("yint", val),
                              placeholder: invalidA ? "—" : fmt(y0, 4),
                              checked,
                              correct: checks.yintOk,
                              supported: true,
                              incorrectMessage: "Evaluate a(−h)² + k.",
                            }),
                        },
                        {
                          id: "roots",
                          render: () =>
                            React.createElement(StepInput, {
                              title: "x-intercepts",
                              prompt:
                                r.kind === "none"
                                  ? "No real x-intercepts. Type none."
                                  : "Enter x-coordinates, comma-separated (smaller first if two).",
                              hint: "Solve a(x − h)² + k = 0; use none if (x − h)² would be negative.",
                              value: answers.roots,
                              onChange: (val) => updateAnswer("roots", val),
                              placeholder: rootsPlaceholder(),
                              checked,
                              correct: checks.rootsOk,
                              supported: true,
                              incorrectMessage: "Compare with green marks on the x-axis (or none).",
                            }),
                        },
                      ],
                    })
                  ),
              checked &&
                React.createElement(
                  "p",
                  { className: allCorrect ? "note correct" : "note incorrect" },
                  invalidA
                    ? "Fix a ≠ 0 before checking."
                    : allCorrect
                    ? "Excellent — answers match this parabola."
                    : "Some answers need attention. Use the graph and key features."
                )
            ),
          bottomTab === "howto" &&
            React.createElement(
              "div",
              { className: "tabContent" },
              React.createElement(InstructionsDetails, { title: "How to use this applet", defaultOpen: true },
                React.createElement(
                  "ul",
                  null,
                  React.createElement("li", null, "Identify ", React.createElement("strong", null, "a, h, k"), " and watch the graph and ", React.createElement("Latex", { tex: "y = a(x-h)^{2}+k" }), " update."),
                  React.createElement("li", null, "Remember ", React.createElement("strong", null, "x + 2"), " is ", React.createElement("Latex", { tex: "x - (-2)" }), ", so ", React.createElement("strong", null, "h = −2"), "."),
                  React.createElement("li", null, "Use ", React.createElement("strong", null, "Show details"), " for intercept algebra; match the printable template in ", React.createElement("code", null, "docs/parabolas/"), "."),
                  React.createElement("li", null, React.createElement("strong", null, "Copy link"), " shares parameters and UI state.")
                ))
            ),
          teacherMode &&
            bottomTab === "teacher" &&
            React.createElement(
              "div",
              { className: "tabContent" },
              React.createElement("h2", null, "Teacher resources"),
              React.createElement("h3", null, "Voice-over sketch"),
              React.createElement("p", null, "Read the vertex (h, k) and axis x = h; decide happy/sad from a; substitute x = 0 for the y-intercept; isolate (x − h)² then take square roots for x-intercepts; sketch with symmetry about x = h."),
              React.createElement("h3", null, "Link to handout"),
              React.createElement("p", { className: "muted" }, "Instructions and blank grids: docs/parabolas (PDF and LaTeX).")
            )
        )
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
