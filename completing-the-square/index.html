    /* Stacked fraction styling */
    .frac {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      vertical-align: middle;
      font-size: 0.9em;
      margin: 0 0.15em;
    }

    .frac>span:first-child {
      border-bottom: 1px solid currentColor;

</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import { InstructionsDetails, TeacherModeToggle } from "../shared/ui/applet-ui.js";

    // ----------------------------------------------------------------------
    // 1. Utility functions – fractions and parsing
    // ----------------------------------------------------------------------
    function gcd(a, b) {
      return b ? gcd(b, a % b) : a;
    }

    // Returns a string like "7/2" or "3", used for checks & placeholders
    function toFractionString(n) {
      if (!Number.isFinite(n)) return "undefined";
      if (Math.abs(n) < 1e-10) return "0";
      const tolerance = 1e-9;
      for (let d of [1, 2, 4]) {
        const num = Math.round(n * d);
        if (Math.abs(num / d - n) < tolerance) {
          const g = gcd(Math.abs(num), d);
          const sn = num / g;
          const sd = d / g;
          if (sd === 1) return String(sn);
          return `${sn}/${sd}`;
        }
      }
      return Number(n.toFixed(3)).toString();
    }

    const fmt = toFractionString;

    // Parse a string like "7/2" or "3" to a number
    function parseFraction(str) {
      str = String(str).trim();
      const m = str.match(/^([+-]?\d+)(?:\/(\d+))?$/);
      if (!m) return NaN;
      const num = Number(m[1]);
      const den = m[2] ? Number(m[2]) : 1;
      return den === 0 ? NaN : num / den;
    }

    function squareFreeFactor(n) {
      n = Math.abs(Number(n));
      if (!Number.isFinite(n) || !Number.isInteger(n)) return { outside: 1, inside: n };
      if (n === 0) return { outside: 0, inside: 1 };
      if (n === 1) return { outside: 1, inside: 1 };
      let outside = 1;
      let inside = n;
      for (let p = 2; p * p <= inside; p++) {
        const sq = p * p;
        while (inside % sq === 0) {
          outside *= p;
          inside = inside / sq;
        }
      }
      return { outside, inside };
    }

    function simplifySqrtToLatex(value) {
      const str = fmt(value); // e.g. "37/4"
      if (str === "undefined") return "\\text{undefined}";
      if (str === "0") return "0";

      const parts = str.split("/");
      const num = parseInt(parts[0], 10);
      const den = parts.length === 2 ? parseInt(parts[1], 10) : 1;
      if (!Number.isFinite(num) || !Number.isFinite(den) || den === 0) return "\\text{undefined}";

      // Handle negative radicand (shouldn't happen here, but keep it safe)
      if (num < 0) return `\\sqrt{${str}}`;

      const denSqrt = Math.sqrt(den);
      if (!Number.isInteger(denSqrt)) {
        // Uncommon for this applet; fall back to sqrt of the fraction.
        return `\\sqrt{\\frac{${num}}{${den}}}`;
      }

      const { outside: outN, inside: inN } = squareFreeFactor(num);
      const outD = denSqrt;

      // sqrt(1) -> 1, sqrt(0) -> 0
      if (inN === 1) {
        const whole = outN / outD;
        if (Number.isInteger(whole)) return String(whole);
        return `\\frac{${outN}}{${outD}}`;
      }

      const outsideLatex =
        outN === 1 && outD === 1 ? "" : outD === 1 ? String(outN) : `\\frac{${outN}}{${outD}}`;
      const radicalLatex = `\\sqrt{${inN}}`;
      return outsideLatex ? `${outsideLatex}${radicalLatex}` : radicalLatex;
    }
    const Latex = ({ tex }) => {
      try {
        const html = katex.renderToString(tex, { throwOnError: false, displayMode: false });
        return React.createElement("span", { dangerouslySetInnerHTML: { __html: html } });
      } catch {
        return React.createElement("span", null, tex);
      }
    };


    // ----------------------------------------------------------------------
    // 2. Expression helpers
    // ----------------------------------------------------------------------
    function signedTerm(value, variable = "") {
      if (value === 0) return "";
      const sign = value < 0 ? " − " : " + ";
      const abs = Math.abs(value);
      const coeff = variable && abs === 1 ? "" : fmt(abs);
      return `${sign}${coeff}${variable}`;
    }

    function quadraticText(p, c) {
      return `x²${signedTerm(Number(p), "x")}${signedTerm(Number(c))}`;
    }

    function bValue(p) {
      return Math.abs(Number(p) / 2);
    }

    function squareTerm(p) {
      const b = bValue(p);
      return b * b;
    }

    function powerText(n) {
      const f = fmt(n);
      if (f.includes('/')) {
        return `(${f})²`;
      }
      return `${f}²`;
    }

    function formText(p) {
      return Number(p) >= 0 ? "a² + 2ab + b²" : "a² − 2ab + b²";
    }

    function middleRewriteWithConstant(p, c) {
      const sign = Number(p) >= 0 ? "+" : "−";
      return `x² ${sign} 2(x)(${fmt(bValue(p))})${signedTerm(Number(c))}`;
    }

    function addSubtractLine(p, c) {
      const sign = Number(p) >= 0 ? "+" : "−";
      const b = bValue(p);
      return `x² ${sign} 2(x)(${fmt(b)}) + ${powerText(b)}${signedTerm(Number(c))} − ${powerText(b)}`;
    }

    function finalText(p, c) {
      const sign = Number(p) >= 0 ? "+" : "−";
      const outside = Number(c) - squareTerm(p);
      return `(x ${sign} ${fmt(bValue(p))})²${signedTerm(outside)}`;
    }

    function canFactorFromTurningPoint(p, c) {
      return Number(c) - squareTerm(p) < 0;
    }

    function radicandValue(p, c) {
      return squareTerm(p) - Number(c);
    }

    // ----------------------------------------------------------------------
    // 3. Acceptance checks (now parse fractions correctly)
    // ----------------------------------------------------------------------
    function normalise(input) {
      return String(input)
        .toLowerCase()
        .replace(/\s+/g, "")
        .replaceAll("−", "-")
        .replaceAll("^2", "²")
        .replaceAll("*", "")
        .replaceAll("·", "");
    }

    function acceptForm(input, p) {
      const n = normalise(input);
      return (
        n === normalise(formText(p)) ||
        (Number(p) >= 0 && (n.includes("+2ab") || n.includes("plus"))) ||
        (Number(p) < 0 && (n.includes("-2ab") || n.includes("minus")))
      );
    }

    function acceptBracketedMiddle(input, p, c) {
      const b = fmt(bValue(p));
      const sign = Number(p) >= 0 ? "+" : "-";
      const cPart = Number(c) >= 0 ? `+${fmt(Number(c))}` : `-${fmt(Math.abs(Number(c)))}`;
      return [
        `x²${sign}2(x)(${b})${cPart}`,
        `x^2${sign}2(x)(${b})${cPart}`,
      ].map(normalise).includes(normalise(input));
    }

    function acceptFullLine(input, p, c) {
      const b = fmt(bValue(p));
      const bSquared = powerText(bValue(p));
      const sign = Number(p) >= 0 ? "+" : "-";
      const cPart = Number(c) >= 0 ? `+${fmt(Number(c))}` : `-${fmt(Math.abs(Number(c)))}`;
      return [
        `x²${sign}2(x)(${b})+${bSquared}${cPart}-${bSquared}`,
        `x^2${sign}2(x)(${b})+${bSquared}${cPart}-${bSquared}`,
      ].map(normalise).includes(normalise(input));
    }

    function acceptFinal(input, p, c) {
      const b = fmt(bValue(p));
      const sign = Number(p) >= 0 ? "+" : "-";
      const outside = Number(c) - squareTerm(p);
      const outsidePart = outside >= 0 ? `+${fmt(outside)}` : `-${fmt(Math.abs(outside))}`;
      return [
        `(x${sign}${b})²${outsidePart}`,
        `(x${sign}${b})^2${outsidePart}`,
      ].map(normalise).includes(normalise(input));
    }

    function acceptFactorisationDecision(input, p, c) {
      const n = normalise(input);
      const canFactor = canFactorFromTurningPoint(p, c);
      if (canFactor) return n === "yes" || n.includes("can") || n.includes("factor");
      return (
        n === "no" ||
        n.includes("not") ||
        n.includes("doesnotfactor") ||
        n.includes("willnotfactor") ||
        n.includes("cannotfactor")
      );
    }

    function acceptRadicand(input, p, c) {
      if (!canFactorFromTurningPoint(p, c)) return true;
      const val = parseFraction(input);
      if (!Number.isFinite(val)) return false;
      return Math.abs(val - radicandValue(p, c)) < 1e-9;
    }

    // ----------------------------------------------------------------------
    // 4. React components for display
    // ----------------------------------------------------------------------

    // Fraction display component
    const Frac = ({ num, den }) => {
      if (den == 1 || !den) return React.createElement(React.Fragment, null, num);
      const numStr = String(num);
      const denStr = String(den);
      return React.createElement(
        'span',
        { className: 'frac', style: { display: 'inline-flex', flexDirection: 'column', alignItems: 'center', verticalAlign: 'middle', fontSize: '0.9em', margin: '0 0.15em' } },
        React.createElement('span', { style: { borderBottom: '1px solid currentColor', paddingBottom: '1px', lineHeight: 1 } }, numStr),
        React.createElement('span', { style: { paddingTop: '1px', lineHeight: 1 } }, denStr)
      );
    };

    // Display a number, using fraction if appropriate
    const DisplayNum = ({ value }) => {
      const s = fmt(value);
      if (s.includes('/')) {
        const [num, den] = s.split('/');
        return React.createElement(Frac, { num, den });
      }
      return React.createElement(React.Fragment, null, s);
    };

    // Display a simplified sqrt expression
    const SqrtDisplay = ({ radicand }) => {
      return React.createElement(Latex, { tex: simplifySqrtToLatex(radicand) });
    };

    // ----------------------------------------------------------------------
    // 5. Examples
    // ----------------------------------------------------------------------
    const EXAMPLES = [
      { p: 6, c: 11 },
      { p: -8, c: 5 },
      { p: 10, c: -3 },
      { p: -4, c: 9 },
      { p: 5, c: 6 },
      { p: -7, c: 3 },
      { p: 9, c: -4 },
      { p: -12, c: -7 },
      { p: 14, c: 2 },
    ];

    function randomExample() {
      return EXAMPLES[Math.floor(Math.random() * EXAMPLES.length)];
    }

    function exampleIndex(ex) {
      return EXAMPLES.findIndex((e) => e.p === ex.p && e.c === ex.c);
    }

    /** Read applet state from the URL (shareable links on GitHub Pages). */
    function readUrlState() {
      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode") === "unsupported" ? "unsupported" : "supported";
      const practiceMode = params.get("practice") === "unscaffolded" ? "unscaffolded" : "scaffolded";
      const teacherMode = params.get("teacher") === "1";
      const showWorking = params.get("demo") !== "0";

      let bottomTab = "practice";
      const tab = params.get("tab");
      if (tab === "howto") bottomTab = "howto";
      else if (tab === "teacher" && teacherMode) bottomTab = "teacher";

      let customP = 6;
      let customC = 11;
      let example = EXAMPLES[0];

      const pNum = Number(params.get("p"));
      const cNum = Number(params.get("c"));
      const exNum = Number(params.get("ex"));

      if (mode === "supported") {
        if (Number.isFinite(exNum) && exNum >= 0 && exNum < EXAMPLES.length) {
          example = EXAMPLES[exNum];
        } else if (Number.isFinite(pNum) && Number.isFinite(cNum)) {
          const idx = EXAMPLES.findIndex((e) => e.p === pNum && e.c === cNum);
          if (idx >= 0) example = EXAMPLES[idx];
        }
      } else {
        if (Number.isFinite(pNum)) customP = pNum;
        if (Number.isFinite(cNum)) customC = cNum;
      }

      return {
        mode,
        practiceMode,
        teacherMode,
        bottomTab,
        showWorking,
        example,
        customP,
        customC,
      };
    }

    /** Build query string for current shareable state (omit defaults where helpful). */
    function buildUrlSearch({
      mode,
      example,
      customP,
      customC,
      practiceMode,
      teacherMode,
      bottomTab,
      showWorking,
    }) {
      const params = new URLSearchParams();
      if (mode === "unsupported") {
        params.set("mode", "unsupported");
        params.set("p", String(customP));
        params.set("c", String(customC));
      } else {
        const idx = exampleIndex(example);
        if (idx >= 0) params.set("ex", String(idx));
        params.set("p", String(example.p));
        params.set("c", String(example.c));
      }
      if (practiceMode === "unscaffolded") params.set("practice", "unscaffolded");
      if (teacherMode) params.set("teacher", "1");
      if (bottomTab === "howto") params.set("tab", "howto");
      else if (bottomTab === "teacher" && teacherMode) params.set("tab", "teacher");
      if (!showWorking) params.set("demo", "0");
      return params.toString();
    }

    // ----------------------------------------------------------------------
    // 6. Sub‑components for practice
    // ----------------------------------------------------------------------
    const TabButton = ({ active, onClick, children }) =>
      React.createElement("button", { className: active ? "tab active" : "tab", onClick }, children);

    const StepInput = ({
      title,
      prompt,
      hint,
      value,
      onChange,
      placeholder,
      checked,
      correct,
      supported,
      equalsPrefix = "",
    }) =>
      React.createElement(
        "div",
        { className: "stepCard" },
        React.createElement(
          "div",
          { className: "stepHeader" },
          React.createElement(
            "div",
            null,
            React.createElement("h3", null, title),
            React.createElement("p", { className: "muted" }, supported ? prompt : title)
          ),
          checked &&
            React.createElement(
              "span",
              { className: correct ? "correct" : "incorrect" },
              correct ? "✓" : "✗"
            )
        ),
        supported && React.createElement("p", { className: "tiny" }, hint),
        equalsPrefix
          ? React.createElement(
              "div",
              { className: "equationInputRow" },
              React.createElement("span", { className: "equalsPrefix" }, equalsPrefix),
              React.createElement("input", {
                className: "studentInput",
                value,
                placeholder,
                onChange: (e) => onChange(e.target.value),
              })
            )
          : React.createElement("input", {
              className: "studentInput",
              value,
              placeholder,
              onChange: (e) => onChange(e.target.value),
            }),
        checked &&
          React.createElement(
            "p",
            { className: correct ? "feedback correct" : "feedback incorrect" },
            correct
              ? "Correct."
              : "Check this line carefully. Follow the bracketed pattern shown in the demonstration."
          )
      );

    const FormChoice = ({ value, onChange, checked, correct, supported }) => {
      const options = ["a² + 2ab + b²", "a² − 2ab + b²"];
      return React.createElement(
        "div",
        { className: "stepCard" },
        React.createElement(
          "div",
          { className: "stepHeader" },
          React.createElement(
            "div",
            null,
            React.createElement("h3", null, "Step 1: Perfect-square form"),
            React.createElement(
              "p",
              { className: "muted" },
              supported
                ? "Which form of the perfect square should you be looking to create?"
                : "Select the perfect-square form."
            )
          ),
          checked &&
            React.createElement(
              "span",
              { className: correct ? "correct" : "incorrect" },
              correct ? "✓" : "✗"
            )
        ),
        supported &&
          React.createElement(
            "p",
            { className: "tiny" },
            "Use a² + 2ab + b² if the middle term is positive, and a² − 2ab + b² if it is negative."
          ),
        React.createElement(
          "div",
          { className: "choiceRow" },
          options.map((option) =>
            React.createElement(
              "button",
              {
                key: option,
                type: "button",
                className: value === option ? "choiceButton selected" : "choiceButton",
                onClick: () => onChange(option),
              },
              option
            )
          )
        ),
        checked &&
          React.createElement(
            "p",
            { className: correct ? "feedback correct" : "feedback incorrect" },
            correct
              ? "Correct."
              : "Choose the form that matches the sign of the middle term."
          )
      );
    };

    const FactorChoice = ({ value, onChange, checked, correct, supported, canFactor }) => {
      const options = [
        { value: "yes", label: "Yes — use difference of two squares" },
        { value: "no", label: "No — it will not factor further over the real numbers" },
