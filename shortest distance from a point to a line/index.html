            const distanceSquared = projectionDistance * projectionDistance;
            const exactDistance = exactDistanceText(areaSquared, vSquared);

                    React.createElement(NumberTriple, { label: "External point P", values: P, onChange: setP }),
                    React.createElement(NumberTriple, { label: "Point A on the line", values: A, onChange: setA }),
                    React.createElement(NumberTriple, { label: "Direction vector v", values: v, onChange: setV }),
                    directionInvalid && React.createElement("p", { className: "error" }, "The direction vector cannot be the zero vector."),
                    React.createElement("div", { className: "representationBox" },

                        ),

                    )

                        React.createElement(TabButton, { active: method === "projection", onClick: () => setMethod("projection") }, "Method 2: Projection"),
                        React.createElement(TabButton, { active: method === "nearest", onClick: () => setMethod("nearest") }, "Method 3: Nearest point")
